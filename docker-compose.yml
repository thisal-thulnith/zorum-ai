services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: zorum
      POSTGRES_PASSWORD: zorum
      POSTGRES_DB: zorum
    ports: ["5433:5432"]   # 5433 on the host — a native postgres already owns 5432 on this Mac
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zorum"]
      interval: 3s
      retries: 10
  mailpit:
    image: axllent/mailpit
    ports: ["8025:8025", "1025:1025"]
volumes:
  pgdata:

